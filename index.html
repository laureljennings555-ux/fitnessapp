<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Recomp Tracker Pro Max</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #3b82f6; --success: #10b981; --warning: #f59e0b; --danger:  #ef4444; --purple: #8b5cf6;
      --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 16px; padding-bottom: 80px; }
    .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); }
    h2 { margin: 0 0 16px 0; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .stats { font-size: 0.85rem; color: #64748b; font-weight: normal; }
    
    /* 进度条 */
    .progress-wrap { margin-bottom: 12px; }
    .progress-header { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 4px; font-weight: 500;}
    .progress-bg { background: #e2e8f0; border-radius: 8px; height: 10px; width: 100%; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; transition: width 0.4s ease; }
    .bg-blue { background: var(--primary); } .bg-green { background: var(--success); } .bg-yellow { background: var(--warning); } .bg-red { background: var(--danger); }

    input, select { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; background:#fff;}
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .input-group { display: flex; gap: 0; margin-bottom: 12px; }
    .input-group input { margin-bottom: 0; border-right: none; border-top-right-radius: 0; border-bottom-right-radius: 0; }
    .input-group select { margin-bottom: 0; width: auto; border-top-left-radius: 0; border-bottom-left-radius: 0; background: #f8fafc; color: #475569;}
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; color: white; background: var(--primary); cursor: pointer; }
    .btn-outline { background: transparent; border: 1px solid #94a3b8; color: #64748b; padding: 6px 10px; font-size: 0.8rem; border-radius: 6px; }
    
    .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .chip { background: #e0e7ff; color: #4338ca; padding: 6px 12px; border-radius: 16px; font-size: 0.85rem; display: flex; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05);}
    .chip span { cursor: pointer; font-weight: 600;}
    .chip-del { background: transparent; border: none; color: #94a3b8; font-size: 1.1rem; padding: 0 0 0 8px; line-height: 1; cursor: pointer; width: auto;}

    .food-list, .weight-list { list-style: none; padding: 0; margin: 0; }
    .food-list li, .weight-list li { padding: 12px 0; border-bottom: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: center; }
    .food-info { display: flex; flex-direction: column; gap: 4px; }
    .food-name-row { display: flex; align-items: center; gap: 8px;}
    .food-name { font-weight: 600; font-size: 0.95rem; }
    .meal-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; color: #fff; background: var(--purple); font-weight: bold;}
    .food-macros { font-size: 0.8rem; color: #64748b; }
    .btn-delete { background: #fee2e2; color: #ef4444; width: auto; padding: 6px 12px; font-size: 0.8rem; border-radius: 6px;}
    .text-sm { font-size: 0.85rem; color: #64748b; margin-bottom: 4px; display: block;}
    
    .dynamic-panel { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; line-height: 1.5; }
    .settings-panel { background: #fffbeb; border: 1px solid #fde68a; padding: 16px; border-radius: 12px; margin-bottom: 16px;}
    .form-group { background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px dashed #cbd5e1; margin-bottom: 12px;}
    .checkbox-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; margin-bottom: 12px; color: #475569;}
    input[type="checkbox"] { width: 18px; height: 18px; margin: 0;}
    .chart-container { position: relative; height: 200px; width: 100%; margin-bottom: 16px; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 999; backdrop-filter: blur(2px); }
    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; background: #fff; border-radius: 16px; padding: 24px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .modal h3 { margin: 0 0 8px 0; color: var(--primary); font-size: 1.2rem; }
    .modal .modal-info { font-size: 0.85rem; color: #64748b; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px dashed #e2e8f0; }
    
    /* 新增复盘卡片样式 */
    .review-box { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; text-align: center; }
    .review-val { font-size: 1.4rem; font-weight: bold; color: var(--primary); margin: 4px 0;}
  </style>
</head>
<body>

  <div class="settings-panel" style="background: #eef2ff; border-color: #c7d2fe;">
    <h2 style="border:none; padding:0; margin-bottom:12px; color: #4338ca;">🤖 身体数据与自适应引擎</h2>
    <div class="grid-3">
      <div><label class="text-sm">性别</label><select id="profile-gender" onchange="saveProfile()" style="padding: 8px;"><option value="male">男</option><option value="female">女</option></select></div>
      <div><label class="text-sm">年龄</label><input type="number" id="profile-age" onchange="saveProfile()" style="padding: 8px;"></div>
      <div><label class="text-sm">身高(cm)</label><input type="number" id="profile-height" onchange="saveProfile()" style="padding: 8px;"></div>
    </div>
    <div class="grid-2" style="margin-bottom: 12px;">
      <div>
        <label class="text-sm" style="color:var(--primary); font-weight:bold;">今日活动系数</label>
        <select id="profile-activity" onchange="saveProfile()">
          <option value="1.2">🛌 休息日 (1.2)</option>
          <option value="1.375">🚶 轻度/力量 (1.375)</option>
          <option value="1.55">🏋️ 中高强度 (1.55)</option>
        </select>
      </div>
      <div>
        <label class="text-sm" style="color:var(--danger); font-weight:bold;">目标增减设定</label>
        <input type="number" id="profile-deficit" placeholder="减脂如: -300" onchange="saveProfile()" style="border-color: var(--danger);">
      </div>
    </div>
    <div id="dynamic-metabolism-panel" style="font-size: 0.85rem; color: #4338ca; line-height: 1.6; background: #e0e7ff; padding: 10px; border-radius: 8px;"></div>
  </div>

  <div class="card" style="background: #fdfaf5; border: 1px solid #fde68a;">
    <h2>📈 近7日滚动复盘</h2>
    <div class="grid-3" style="gap: 8px;">
      <div class="review-box">
        <div class="text-sm">7天平均体重</div>
        <div class="review-val" id="avg-weight">--</div>
        <div class="text-sm">kg</div>
      </div>
      <div class="review-box">
        <div class="text-sm">平均日摄入</div>
        <div class="review-val" id="avg-intake">--</div>
        <div class="text-sm">kcal</div>
      </div>
      <div class="review-box" style="background: #eff6ff; border-color: #bfdbfe;">
        <div class="text-sm" style="color: #1d4ed8;">日均热量缺口</div>
        <div class="review-val" id="avg-deficit" style="color: #1d4ed8;">--</div>
        <div class="text-sm">kcal</div>
      </div>
    </div>
    <div class="text-sm" style="margin-top: 10px; color: #94a3b8; text-align: center;">(每日点击下方“结束今日”归档后更新)</div>
  </div>

  <div class="card">
    <h2>📊 今日动态进度 <button class="btn-outline" onclick="endAndResetDaily()" style="width:auto; color: #ef4444; border-color: #ef4444;">🌙 结束今日并归档</button></h2>
    
    <div class="progress-wrap">
      <div class="progress-header"><span>🔥 热量 (kcal)</span> <span id="text-cal" class="stats">0 / --</span></div>
      <div class="progress-bg"><div class="progress-fill bg-blue" id="bar-cal"></div></div>
      <div id="cal-diff-alert" style="font-size: 0.85rem; text-align: right; margin-top: 4px; font-weight: bold;"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-header"><span>🍗 蛋白质 (g)</span> <span id="text-pro" class="stats">0 / --</span></div>
      <div class="progress-bg"><div class="progress-fill bg-green" id="bar-pro"></div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-header"><span>🍚 碳水化合物 (g)</span> <span id="text-carb" class="stats">0 / --</span></div>
      <div class="progress-bg"><div class="progress-fill bg-yellow" id="bar-carb"></div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-header"><span>🥑 脂肪 (g)</span> <span id="text-fat" class="stats">0 / --</span></div>
      <div class="progress-bg"><div class="progress-fill bg-red" id="bar-fat"></div></div>
    </div>
    <div class="text-sm" style="text-align: right; color: #8b5cf6; font-weight: bold; margin-top: 8px;">🧂 今日总钠摄入: <span id="text-sodium">0</span> mg</div>
  </div>

  <div class="card">
    <h2>📸 精准饮食记录</h2>
    <div id="saved-foods-area" style="display: none;">
      <div class="text-sm" style="margin-bottom: 8px;">⭐️ 快捷添加 (点击记录)：</div>
      <div class="chip-container" id="saved-foods-list"></div>
    </div>

    <div class="grid-2">
      <div><label class="text-sm">食物名称</label><input type="text" id="food-name" placeholder="例如：大米饭"></div>
      <div><label class="text-sm">就餐时段</label><select id="food-meal"><option value="早餐">🌅 早餐</option><option value="午餐">🍱 午餐</option><option value="晚餐">🍽️ 晚餐</option><option value="加餐">🍎 加餐</option></select></div>
    </div>
    
    <div class="form-group">
      <div class="grid-2">
        <div><label class="text-sm">基于每多少克/份？</label><input type="number" id="food-base" value="100"></div>
        <div><label class="text-sm" style="color:var(--primary); font-weight:bold;">本次吃多少？</label><input type="text" id="food-eat" placeholder="支持算式如 110*2"></div>
      </div>
    </div>

    <label class="text-sm">👇 包装袋上的五大项：</label>
    <div class="input-group">
      <input type="number" id="food-energy" placeholder="能量数值">
      <select id="energy-unit"><option value="kj">千焦(kJ)</option><option value="kcal">千卡(kcal)</option></select>
    </div>

    <div class="grid-2">
      <input type="number" id="food-pro" placeholder="蛋白质(g)">
      <input type="number" id="food-carb" placeholder="碳水(g)">
      <input type="number" id="food-fat" placeholder="脂肪(g)">
      <input type="number" id="food-sodium" placeholder="钠(mg)">
    </div>
    
    <label class="checkbox-wrap"><input type="checkbox" id="save-to-lib"> 同时存入“快捷食物库”</label>
    <button onclick="addFood()">存入流水账</button>
  </div>

  <div class="card">
    <h2>📝 今日饮食流水账</h2>
    <ul class="food-list" id="food-history"></ul>
    <div id="empty-food" class="text-sm" style="text-align: center; padding: 10px; color: #94a3b8;">今天还没吃东西哦</div>
  </div>

  <div class="card">
    <h2>⚖️ 体重打卡与趋势</h2>
    <div class="grid-2" style="grid-template-columns: 1fr auto; margin-bottom: 16px;">
      <input type="number" id="weight-input" step="0.1" placeholder="今日体重(kg)" style="margin-bottom:0;">
      <button onclick="addWeight()" style="width: 80px;">打卡</button>
    </div>
    <div class="chart-container"><canvas id="weightChart"></canvas></div>
    <ul class="weight-list" id="weight-history"></ul>
  </div>

  <div class="card">
    <h2>💾 数据安全与备份</h2>
    <div class="grid-2">
      <button onclick="exportData()" style="background: #10b981;">⬇️ 导出备份 (JSON)</button>
      <label style="background: transparent; border: 2px solid #3b82f6; color: #3b82f6; padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: bold; text-align: center; cursor: pointer; margin: 0; box-sizing: border-box;">
        ⬆️ 恢复数据<input type="file" accept=".json" id="import-file" style="display:none;" onchange="importData(event)">
      </label>
    </div>
  </div>

  <div class="modal-overlay" id="quick-modal-overlay" onclick="closeQuickModal()"></div>
  <div class="modal" id="quick-modal">
    <h3 id="qm-title">添加食物</h3>
    <div class="modal-info" id="qm-base-info"></div>
    <label class="text-sm" style="color:var(--primary); font-weight:bold; display:block; margin-bottom:4px;">👇 本次吃多少？(必填)</label>
    <input type="text" id="qm-eat" placeholder="如：150 或 110*2" style="border: 2px solid var(--primary);">
    <label class="text-sm" style="display:block; margin-bottom:4px;">这是哪一餐？</label>
    <select id="qm-meal" style="margin-bottom: 24px;">
      <option value="早餐">🌅 早餐</option><option value="午餐" selected>🍱 午餐</option><option value="晚餐">🍽️ 晚餐</option><option value="加餐">🍎 加餐</option>
    </select>
    <div class="grid-2">
      <button onclick="closeQuickModal()" style="background: #f1f5f9; color: #475569;">取消</button>
      <button onclick="confirmQuickAdd()">确认添加</button>
    </div>
  </div>

  <script>
    let profile = JSON.parse(localStorage.getItem('recomp_profile_v3')) || { gender: 'male', age: 20, height: 178, activity: 1.375, deficit: -300 };
    let dailyLog = JSON.parse(localStorage.getItem('recomp_daily_log_v2')) || [];
    let weightLog = JSON.parse(localStorage.getItem('recomp_weights')) || [];
    let savedFoods = JSON.parse(localStorage.getItem('recomp_saved_foods_v2')) || [];
    
    // 新增：每日归档记录 [ {date, consumed, target, tdee}, ... ]
    let dailySummaries = JSON.parse(localStorage.getItem('recomp_daily_summaries')) || [];
    let chartInstance = null;
    let currentQuickIndex = -1; 

    window.onload = function() {
      document.getElementById('profile-gender').value = profile.gender;
      document.getElementById('profile-age').value = profile.age;
      document.getElementById('profile-height').value = profile.height;
      document.getElementById('profile-activity').value = profile.activity;
      document.getElementById('profile-deficit').value = profile.deficit;
      
      renderDashboard(); renderFoodLog(); renderWeightHistory(); renderSavedFoods(); renderWeeklyReview();
    };

    function getDynamicTargets() {
      const currentWeight = weightLog.length > 0 ? weightLog[0].weight : 75; 
      let bmr = 0;
      if (profile.gender === 'male') { bmr = Math.round((10 * currentWeight) + (6.25 * profile.height) - (5 * profile.age) + 5); } 
      else { bmr = Math.round((10 * currentWeight) + (6.25 * profile.height) - (5 * profile.age) - 161); }
      
      const tdee = Math.round(bmr * profile.activity);
      let targetCal = tdee + profile.deficit;
      if (targetCal < 1200) targetCal = 1200; 
      
      const targetPro = Math.round(currentWeight * 2);             
      const targetFat = Math.round((bmr * 0.25) / 9);              
      const remainingCals = targetCal - (targetPro * 4) - (targetFat * 9);
      const targetCarb = Math.max(0, Math.round(remainingCals / 4));

      return { cal: targetCal, pro: targetPro, carb: targetCarb, fat: targetFat, bmr: bmr, tdee: tdee, weight: currentWeight };
    }

    function saveProfile() {
      profile.gender = document.getElementById('profile-gender').value;
      profile.age = parseInt(document.getElementById('profile-age').value) || 20;
      profile.height = parseFloat(document.getElementById('profile-height').value) || 178;
      profile.activity = parseFloat(document.getElementById('profile-activity').value) || 1.375;
      profile.deficit = parseInt(document.getElementById('profile-deficit').value) || 0;
      localStorage.setItem('recomp_profile_v3', JSON.stringify(profile));
      renderDashboard(); 
    }

    function renderDashboard() {
      const t = getDynamicTargets();
      let sums = { cal: 0, pro: 0, carb: 0, fat: 0, sodium: 0 };
      dailyLog.forEach(food => { sums.cal += food.cal; sums.pro += food.pro; sums.carb += food.carb; sums.fat += food.fat; sums.sodium += (food.sodium || 0); });
      
      document.getElementById('dynamic-metabolism-panel').innerHTML = `
        基于 <b>${t.weight.toFixed(1)}kg</b> 重算：<br>
        BMR: <b>${t.bmr}</b> | 今日 TDEE: <b>${t.tdee}</b> kcal<br>
        🔥 目标热量 = <b>${t.cal}</b> kcal<br>
        🍗 蛋白(×2) = <b>${t.pro}g</b> | 🥑 脂肪 = <b>${t.fat}g</b> | 🍚 碳水 = <b>${t.carb}g</b>
      `;

      // 实时差值计算
      const diffCal = t.cal - sums.cal;
      const alertEl = document.getElementById('cal-diff-alert');
      if (diffCal >= 0) {
        alertEl.innerHTML = `✅ 还有配额：<span style="color:#10b981;">可吃 ${Math.round(diffCal)} kcal</span>`;
      } else {
        alertEl.innerHTML = `⚠️ 热量告急：<span style="color:#ef4444;">已超标 ${Math.round(Math.abs(diffCal))} kcal</span>`;
      }

      document.getElementById('text-cal').innerText = `${Math.round(sums.cal)} / ${t.cal}`;
      document.getElementById('text-pro').innerText = `${Math.round(sums.pro)} / ${t.pro}`;
      document.getElementById('text-carb').innerText = `${Math.round(sums.carb)} / ${t.carb}`;
      document.getElementById('text-fat').innerText = `${Math.round(sums.fat)} / ${t.fat}`;
      document.getElementById('text-sodium').innerText = Math.round(sums.sodium);
      
      document.getElementById('bar-cal').style.width = Math.min((sums.cal/t.cal)*100, 100) + '%';
      document.getElementById('bar-pro').style.width = Math.min((sums.pro/t.pro)*100, 100) + '%';
      document.getElementById('bar-carb').style.width = Math.min((sums.carb/t.carb)*100, 100) + '%';
      document.getElementById('bar-fat').style.width = Math.min((sums.fat/t.fat)*100, 100) + '%';
    }

    // ====== 新增：7天数据统计 ======
    function renderWeeklyReview() {
      // 1. 算7天平均体重
      const recentWeights = weightLog.slice(0, 7);
      if (recentWeights.length > 0) {
        const sumW = recentWeights.reduce((acc, curr) => acc + curr.weight, 0);
        document.getElementById('avg-weight').innerText = (sumW / recentWeights.length).toFixed(1);
      }

      // 2. 算7天平均摄入与缺口
      const recentSummaries = dailySummaries.slice(0, 7);
      if (recentSummaries.length > 0) {
        const sumIntake = recentSummaries.reduce((acc, curr) => acc + curr.consumed, 0);
        const avgIntake = Math.round(sumIntake / recentSummaries.length);
        document.getElementById('avg-intake').innerText = avgIntake;
        
        // 实际平均热量缺口 = 平均总消耗(TDEE) - 平均实际摄入
        const sumTdee = recentSummaries.reduce((acc, curr) => acc + curr.tdee, 0);
        const avgTdee = Math.round(sumTdee / recentSummaries.length);
        const realDeficit = avgTdee - avgIntake;
        
        const defEl = document.getElementById('avg-deficit');
        defEl.innerText = realDeficit > 0 ? `-${realDeficit}` : `+${Math.abs(realDeficit)}`;
        defEl.style.color = realDeficit > 0 ? '#10b981' : '#ef4444'; 
      }
    }

    // ====== 新增：结束今日并归档 ======
    function endAndResetDaily() {
      if(confirm('确定要结束今天的记录并归档吗？\n这会将今天的总摄入计入历史平均值，并清空当前流水账。')) {
        const t = getDynamicTargets();
        let sums = { cal: 0 };
        dailyLog.forEach(food => sums.cal += food.cal);
        
        const dateStr = new Date().toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
        
        // 保存每日总结
        dailySummaries.unshift({ 
          date: dateStr, 
          consumed: Math.round(sums.cal), 
          target: t.cal, 
          tdee: t.tdee 
        });
        
        localStorage.setItem('recomp_daily_summaries', JSON.stringify(dailySummaries));
        
        // 清空今日
        dailyLog = []; 
        localStorage.setItem('recomp_daily_log_v2', JSON.stringify(dailyLog)); 
        
        renderDashboard(); 
        renderFoodLog(); 
        renderWeeklyReview();
        alert('✅ 今日数据已归档！');
      } 
    }

    function parseMathInput(inputStr) {
      if (!inputStr) return NaN;
      const sanitized = String(inputStr).replace(/[^0-9\.\+\-\*\/]/g, '');
      if (sanitized === '') return NaN;
      try { return new Function('return ' + sanitized)(); } catch (e) { return NaN; }
    }

    function renderSavedFoods() {
      const area = document.getElementById('saved-foods-area');
      const list = document.getElementById('saved-foods-list');
      list.innerHTML = '';
      if (savedFoods.length === 0) { area.style.display = 'none'; return; }
      area.style.display = 'block';
      savedFoods.forEach((food, index) => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = `<span onclick="openQuickModal(${index})">🍔 ${food.name}</span><button class="chip-del" onclick="deleteSavedFood(${index})">×</button>`;
        list.appendChild(chip);
      });
    }

    function openQuickModal(index) {
      currentQuickIndex = index;
      const food = savedFoods[index];
      document.getElementById('qm-title').innerText = `添加【${food.name}】`;
      document.getElementById('qm-base-info').innerText = `此食物营养数据基于：${food.baseAmt} 克/份`;
      document.getElementById('qm-eat').value = ''; 
      document.getElementById('qm-eat').placeholder = `不填则默认按 ${food.baseAmt} 算`;
      document.getElementById('quick-modal-overlay').style.display = 'block';
      document.getElementById('quick-modal').style.display = 'block';
    }

    function closeQuickModal() {
      document.getElementById('quick-modal-overlay').style.display = 'none';
      document.getElementById('quick-modal').style.display = 'none';
      currentQuickIndex = -1;
    }

    function confirmQuickAdd() {
      if (currentQuickIndex === -1) return;
      const food = savedFoods[currentQuickIndex];
      const eatAmtRaw = document.getElementById('qm-eat').value;
      let eatAmt = parseMathInput(eatAmtRaw);
      
      if (isNaN(eatAmt) || eatAmt <= 0) {
        if (eatAmtRaw.trim() === '') { eatAmt = food.baseAmt; } 
        else { return alert('❌ 请输入有效的数字或算式！'); }
      }

      const mealType = document.getElementById('qm-meal').value;
      const ratio = eatAmt / food.baseAmt;
      let finalKcal = food.energy;
      if (food.unit === 'kj') finalKcal = food.energy / 4.184;
      
      dailyLog.push({ 
        id: Date.now(), name: `${food.name} (${eatAmt})`, meal: mealType,
        cal: Math.round(finalKcal * ratio), pro: Math.round((food.pro * ratio) * 10) / 10, 
        carb: Math.round((food.carb * ratio) * 10) / 10, fat: Math.round((food.fat * ratio) * 10) / 10,
        sodium: Math.round(food.sodium * ratio)
      });
      
      saveAndRefreshFood();
      closeQuickModal();
    }

    function deleteSavedFood(index) {
      if(confirm('确定删除快捷食物吗？')) {
        savedFoods.splice(index, 1);
        localStorage.setItem('recomp_saved_foods_v2', JSON.stringify(savedFoods));
        renderSavedFoods();
      }
    }

    function addFood() {
      const name = document.getElementById('food-name').value || '未命名';
      const mealType = document.getElementById('food-meal').value;
      const baseAmt = parseFloat(document.getElementById('food-base').value) || 100;
      
      const eatAmtRaw = document.getElementById('food-eat').value;
      let eatAmt = parseMathInput(eatAmtRaw);
      if (isNaN(eatAmt)) eatAmt = baseAmt; 

      const energyVal = parseFloat(document.getElementById('food-energy').value) || 0;
      const energyUnit = document.getElementById('energy-unit').value; 
      const basePro = parseFloat(document.getElementById('food-pro').value) || 0;
      const baseCarb = parseFloat(document.getElementById('food-carb').value) || 0;
      const baseFat = parseFloat(document.getElementById('food-fat').value) || 0;
      const baseSodium = parseFloat(document.getElementById('food-sodium').value) || 0;
      
      if(energyVal === 0 && basePro === 0 && baseCarb === 0 && baseFat === 0) return alert('请填写营养数据');

      let kcalPerBase = energyVal;
      if (energyUnit === 'kj') kcalPerBase = energyVal / 4.184;

      if (document.getElementById('save-to-lib').checked) {
        savedFoods.push({ name, baseAmt, energy: energyVal, unit: energyUnit, pro: basePro, carb: baseCarb, fat: baseFat, sodium: baseSodium });
        localStorage.setItem('recomp_saved_foods_v2', JSON.stringify(savedFoods));
        renderSavedFoods();
        document.getElementById('save-to-lib').checked = false;
      }

      const ratio = eatAmt / baseAmt;
      dailyLog.push({ 
        id: Date.now(), name: `${name} (${eatAmt})`, meal: mealType,
        cal: Math.round(kcalPerBase * ratio), pro: Math.round((basePro * ratio)*10)/10, 
        carb: Math.round((baseCarb * ratio)*10)/10, fat: Math.round((baseFat * ratio)*10)/10,
        sodium: Math.round(baseSodium * ratio)
      });
      
      saveAndRefreshFood();
      
      document.getElementById('food-name').value = ''; document.getElementById('food-eat').value = '';
      document.getElementById('food-energy').value = ''; document.getElementById('food-pro').value = '';
      document.getElementById('food-carb').value = ''; document.getElementById('food-fat').value = '';
      document.getElementById('food-sodium').value = ''; document.getElementById('food-base').value = '100'; 
    }

    function renderFoodLog() {
      const list = document.getElementById('food-history');
      list.innerHTML = '';
      if (dailyLog.length === 0) document.getElementById('empty-food').style.display = 'block';
      else {
        document.getElementById('empty-food').style.display = 'none';
        dailyLog.forEach(food => {
          const li = document.createElement('li');
          li.innerHTML = `
            <div class="food-info">
              <div class="food-name-row"><span class="meal-tag">${food.meal}</span><span class="food-name">${food.name}</span></div>
              <span class="food-macros">🔥${food.cal}kcal | 🍗${food.pro}g | 🍚${food.carb}g | 🥑${food.fat}g | 🧂${food.sodium||0}mg</span>
            </div>
            <button class="btn-delete" onclick="deleteFood(${food.id})">删除</button>
          `;
          list.appendChild(li);
        });
      }
    }

    function deleteFood(id) { dailyLog = dailyLog.filter(f => f.id !== id); saveAndRefreshFood(); }
    function saveAndRefreshFood() { localStorage.setItem('recomp_daily_log_v2', JSON.stringify(dailyLog)); renderDashboard(); renderFoodLog(); }

    function addWeight() {
      const weight = parseFloat(document.getElementById('weight-input').value);
      if (!weight) return alert('请输入有效体重');
      const dateStr = new Date().toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
      weightLog.unshift({ date: dateStr, weight: weight });
      localStorage.setItem('recomp_weights', JSON.stringify(weightLog));
      document.getElementById('weight-input').value = '';
      
      renderWeightHistory(); 
      renderDashboard(); 
      renderWeeklyReview();
    }

    function renderWeightHistory() {
      const list = document.getElementById('weight-history');
      list.innerHTML = '';
      weightLog.forEach((entry, index) => {
        let diffStr = '<span style="color:#94a3b8;">-</span>';
        if (index < weightLog.length - 1) {
          const diff = (entry.weight - weightLog[index + 1].weight).toFixed(1);
          if (diff > 0) diffStr = `<span style="color:#ef4444;">+${diff}kg</span>`;
          else if (diff < 0) diffStr = `<span style="color:#10b981;">${diff}kg</span>`;
        }
        const li = document.createElement('li');
        li.innerHTML = `<span><span class="text-sm" style="display:inline-block; width:45px;">${entry.date}</span> &nbsp; ${entry.weight.toFixed(1)} kg</span> ${diffStr}`;
        list.appendChild(li);
      });
      updateChart(); 
    }

    function updateChart() {
      const ctx = document.getElementById('weightChart').getContext('2d');
      const recent7 = weightLog.slice(0, 7).reverse();
      const labels = recent7.map(entry => entry.date);
      const data = recent7.map(entry => entry.weight);
      const minWeight = Math.min(...data) || 70;
      const maxWeight = Math.max(...data) || 80;

      if (chartInstance) {
        chartInstance.data.labels = labels; chartInstance.data.datasets[0].data = data;
        chartInstance.options.scales.y.suggestedMin = minWeight - 0.5; chartInstance.options.scales.y.suggestedMax = maxWeight + 0.5;
        chartInstance.update();
      } else {
        chartInstance = new Chart(ctx, {
          type: 'line',
          data: { labels: labels, datasets: [{ label: '体重', data: data, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 2, fill: true, tension: 0.3 }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { suggestedMin: minWeight - 0.5, suggestedMax: maxWeight + 0.5 } } }
        });
      }
    }

    function exportData() {
      const data = {
        profile: localStorage.getItem('recomp_profile_v3'),
        dailyLog: localStorage.getItem('recomp_daily_log_v2'),
        weights: localStorage.getItem('recomp_weights'),
        savedFoods: localStorage.getItem('recomp_saved_foods_v2'),
        summaries: localStorage.getItem('recomp_daily_summaries')
      };
      const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `recomp_backup_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.json`;
      a.click();
    }

    function importData(event) {
      const file = event.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if(data.profile) localStorage.setItem('recomp_profile_v3', data.profile);
          if(data.dailyLog) localStorage.setItem('recomp_daily_log_v2', data.dailyLog);
          if(data.weights) localStorage.setItem('recomp_weights', data.weights);
          if(data.savedFoods) localStorage.setItem('recomp_saved_foods_v2', data.savedFoods);
          if(data.summaries) localStorage.setItem('recomp_daily_summaries', data.summaries);
          alert('🎉 恢复成功！'); location.reload();
        } catch(err) { alert('❌ 文件格式错误！'); }
      };
      reader.readAsText(file);
    }
  </script>
</body>
